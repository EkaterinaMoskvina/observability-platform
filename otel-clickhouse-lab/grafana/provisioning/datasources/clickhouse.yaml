apiVersion: 1
datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    jsonData:
      defaultDatabase: $CLICKHOUSE_DB
      port: 9000
      protocol: native
    secureJsonData:
      password: $CLICKHOUSE_PASSWORD
    user: $CLICKHOUSE_USER
    isDefault: true
