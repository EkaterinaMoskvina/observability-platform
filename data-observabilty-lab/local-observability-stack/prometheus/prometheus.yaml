# Prometheus Configuration
# Хранилище метрик + PromQL запросы

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'workstation-monitor'

# Алерты (опционально)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Правила алертов
rule_files:
  - /etc/prometheus/alerts/*.yaml
  - /etc/prometheus/alerts/*.yml

# Источники метрик
scrape_configs:
  # Prometheus сам себя
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # OTel Collector internal metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
    metrics_path: /metrics

  # ============================================
  # ClickHouse built-in Prometheus endpoint
  # Метрики: ClickHouseMetrics_*, ClickHouseAsyncMetrics_*, ClickHouseProfileEvents_*
  # Используются для сравнения NFR с Prometheus
  # ============================================
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363']
    metrics_path: /metrics
    scrape_interval: 15s

# Remote Write API (для приёма от OTel Collector)
# Включается флагом --web.enable-remote-write-receiver
