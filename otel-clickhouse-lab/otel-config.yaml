receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  # 1. Memory Limiter — защита от OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 256        # лимит памяти
    spike_limit_mib: 64   # допустимый всплеск

  # 2. Transform — обогащение и валидация данных
  transform:
    log_statements:
      - context: log
        statements:
          # Добавляем окружение ко всем логам
          - set(attributes["env"], "lab")
          # Добавляем временную метку обработки
          - set(attributes["processed_at"], Now())
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["env"], "lab")
    trace_statements:
      - context: span
        statements:
          - set(attributes["env"], "lab")

  # 3. Batch — группировка перед отправкой
  batch:
    timeout: 5s
    send_batch_size: 1000

exporters:
  clickhouse:
    endpoint: "tcp://clickhouse:9000?database=${env:CLICKHOUSE_DB}&username=${env:CLICKHOUSE_USER}&password=${env:CLICKHOUSE_PASSWORD}"
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # Debug exporter — чтобы видеть что проходит через pipeline
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]
  pipelines:
    # Порядок процессоров повторяет схему:
    # OTLP Receiver → Memory Limiter → Transform → Batch → ClickHouse
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [clickhouse, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [clickhouse, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [clickhouse, debug]
